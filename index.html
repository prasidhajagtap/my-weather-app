<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Weather Market Terminal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0a08" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Courier+Prime&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet" />

  <style>
    /* ── Theme Architecture ── */
    :root {
      --bg: #f5f2ed;
      --card: rgba(255, 255, 255, 0.8);
      --text: #1a1a1a;
      --gold: #b08d3e;
      --green: #2d8659;
      --red: #c24141;
      --border: rgba(176, 141, 62, 0.2);
      --sentiment-bg: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a08;
        --card: rgba(18, 16, 14, 0.9);
        --text: #e8dfc8;
        --border: rgba(201, 168, 76, 0.15);
      }
    }

    /* ── Sentiment Backgrounds ── */
    .bullish { --sentiment-bg: linear-gradient(180deg, var(--bg) 0%, rgba(45, 134, 89, 0.1) 100%); }
    .bearish { --sentiment-bg: linear-gradient(180deg, var(--bg) 0%, rgba(194, 65, 65, 0.1) 100%); }
    .sideways { --sentiment-bg: linear-gradient(180deg, var(--bg) 0%, rgba(176, 141, 62, 0.1) 100%); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); background-image: var(--sentiment-bg); 
      color: var(--text); font-family: 'Barlow Condensed', sans-serif; 
      min-height: 100vh; transition: background 1s ease;
    }

    #app { 
      max-width: 420px; margin: 0 auto; padding: 20px; 
      display: flex; flex-direction: column; gap: 12px;
    }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; backdrop-filter: blur(10px);
    }

    /* ── Search & Header ── */
    .terminal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ticker-id { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--gold); letter-spacing: 2px; }
    
    .search-box {
      width: 100%; background: rgba(0,0,0,0.05); border: 1px solid var(--border);
      padding: 12px; border-radius: 8px; color: var(--text);
      font-family: 'Courier Prime', monospace; font-size: 14px; outline: none;
    }

    /* ── Market UI ── */
    .price-main { font-family: 'Cormorant Garamond', serif; font-size: 64px; line-height: 1; margin: 10px 0; }
    .spread-chip { 
      display: inline-block; padding: 4px 12px; border-radius: 4px; 
      font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: bold;
    }
    .up { background: rgba(45, 134, 89, 0.15); color: var(--green); }
    .down { background: rgba(194, 65, 65, 0.15); color: var(--red); }

    /* ── Comparison Module ── */
    .vs-container { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; text-align: center; }
    .vs-divider { font-family: 'Courier Prime', monospace; color: var(--gold); font-size: 10px; }
    .vs-city { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
    .vs-temp { font-family: 'Cormorant Garamond', serif; font-size: 28px; }

    .hidden { display: none; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="sideways">

<div id="app">
  <div class="card">
    <div class="terminal-header">
      <span class="ticker-id">WTH.MARKET // TERMINAL</span>
      <span id="clock" class="ticker-id">00:00:00</span>
    </div>
    <input type="text" id="search" class="search-box" placeholder="SEARCH CITY (E.G. TOKYO)..." autocomplete="off">
  </div>

  <div id="main-card" class="card">
    <div id="loader" class="spinner"></div>
    <div id="content" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
          <p id="city-name" class="vs-city">CONNECTING...</p>
          <h1 class="price-main">₹<span id="temp-int">00</span><span style="font-size: 0.5em; opacity: 0.6;" id="temp-dec">.00</span></h1>
        </div>
        <div id="sentiment-badge" class="spread-chip up">BULLISH</div>
      </div>
      <p id="weather-desc" style="font-size: 12px; color: var(--gold); letter-spacing: 1px;"></p>
    </div>
  </div>

  <div id="compare-card" class="card hidden">
    <p class="ticker-id" style="margin-bottom: 15px;">MARKET COMPARISON (SPREAD)</p>
    <div class="vs-container">
      <div>
        <p id="local-name-vs" class="vs-city">LOCAL</p>
        <p id="local-temp-vs" class="vs-temp">--°</p>
      </div>
      <div class="vs-divider">VS</div>
      <div>
        <p id="target-name-vs" class="vs-city">TARGET</p>
        <p id="target-temp-vs" class="vs-temp">--°</p>
      </div>
    </div>
    <div id="spread-calc" style="text-align: center; margin-top: 15px; font-family: 'Courier Prime'; font-size: 11px;">
      SPREAD: <span id="spread-value">0.00</span>%
    </div>
  </div>

  <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div>
      <p class="ticker-id" style="font-size: 10px;">LIQUIDITY</p>
      <p id="humidity" class="vs-temp" style="font-size: 24px;">--%</p>
    </div>
    <div>
      <p class="ticker-id" style="font-size: 10px;">VOLATILITY</p>
      <p id="wind" class="vs-temp" style="font-size: 24px;">--</p>
    </div>
  </div>
</div>

<script>
  let localData = null;

  // ── Core API Logic ──
  async function fetchWeather(lat, lon) {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`);
    return r.json();
  }

  function getSentiment(code) {
    if (code <= 3) return { label: 'BULLISH', class: 'bullish', chip: 'up' };
    if (code >= 51) return { label: 'BEARISH', class: 'bearish', chip: 'down' };
    return { label: 'SIDEWAYS', class: 'sideways', chip: 'flat' };
  }

  // ── UI Updates ──
  function updateUI(data, name, isLocal = true) {
    const cur = data.current;
    const sent = getSentiment(cur.weather_code);
    
    // Background Update
    document.body.className = sent.class;

    // Price Update
    const temp = cur.temperature_2m;
    document.getElementById('temp-int').textContent = Math.floor(Math.abs(temp));
    document.getElementById('temp-dec').textContent = `.${(Math.abs(temp) % 1).toFixed(2).split('.')}`;
    document.getElementById('city-name').textContent = name.toUpperCase();
    document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
    document.getElementById('wind').textContent = `${cur.wind_speed_10m}km/h`;
    
    const badge = document.getElementById('sentiment-badge');
    badge.textContent = sent.label;
    badge.className = `spread-chip ${sent.chip}`;

    if (isLocal) localData = { temp, name };

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
  }

  // ── Search & Comparison Logic ──
  document.getElementById('search').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const query = e.target.value.trim();
      if (!query) return;

      try {
        const geoR = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${query}&count=1&language=en&format=json`);
        const geoD = await geoR.json();
        
        if (geoD.results && geoD.results) {
          const target = geoD.results;
          const weather = await fetchWeather(target.latitude, target.longitude);
          
          // Update Comparison Card
          document.getElementById('compare-card').classList.remove('hidden');
          document.getElementById('local-name-vs').textContent = localData.name;
          document.getElementById('local-temp-vs').textContent = `${localData.temp.toFixed(1)}°`;
          document.getElementById('target-name-vs').textContent = target.name.toUpperCase();
          document.getElementById('target-temp-vs').textContent = `${weather.current.temperature_2m.toFixed(1)}°`;
          
          const spread = ((weather.current.temperature_2m - localData.temp) / localData.temp * 100).toFixed(2);
          const spreadEl = document.getElementById('spread-value');
          spreadEl.textContent = (spread > 0 ? '+' : '') + spread;
          spreadEl.className = spread >= 0 ? 'up' : 'down';

          // Refresh Main Card with Search Result
          updateUI(weather, target.name, false);
        }
      } catch (err) { console.error("Market error", err); }
    }
  });

  // ── Initialization ──
  function init() {
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
    }, 1000);

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude: lat, longitude: lon } = pos.coords;
        const weather = await fetchWeather(lat, lon);
        // Reverse geocode for city name
        const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
        const geoD = await geo.json();
        updateUI(weather, geoD.city || "LOCAL TERMINAL");
      },
      async () => {
        // Fallback to Mumbai if location denied
        const weather = await fetchWeather(19.076, 72.877);
        updateUI(weather, "MUMBAI (F-BACK)");
      }
    );
  }

  init();
</script>

</body>
</html>

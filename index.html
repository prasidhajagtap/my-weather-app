<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Weather Market Terminal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0a08" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Barlow+Condensed:wght@400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0c0a08;
      --gold: #c9a84c;
      --gold-line: rgba(201, 168, 76, 0.1);
      --cream: #e8dfc8;
      --muted: #7a6e5d;
      --glass: rgba(15, 12, 10, 0.92); /* Higher opacity for readability */
      --gb: rgba(201, 168, 76, 0.15);
      --green: #4caf7a;
      --red: #c95252;
    }

    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background: var(--bg); color: var(--cream);
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    /* Subtle Money Sky Layer */
    #money-sky {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15;
    }

    .celestial-coin {
      position: absolute; font-size: 50px; filter: drop-shadow(0 0 10px var(--gold));
      animation: coinSpin 12s linear infinite;
    }
    @keyframes coinSpin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    /* Graph paper background */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--gold-line) 1px, transparent 1px), 
                        linear-gradient(90deg, var(--gold-line) 1px, transparent 1px);
      background-size: 40px 40px; z-index: -1;
    }

    #app {
      position: relative; z-index: 10; height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: max(20px, env(safe-area-inset-top)) 20px;
      overflow-y: auto;
    }

    .widget { width: 100%; max-width: 390px; display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--glass); border: 1px solid var(--gb); border-radius: 18px;
      backdrop-filter: blur(15px); padding: 20px; position: relative;
    }

    .terminal-input {
      width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--gold-line);
      color: var(--gold); font-family: 'Courier Prime', monospace;
      padding: 10px; border-radius: 8px; font-size: 11px; margin-top: 12px;
      outline: none; text-transform: uppercase;
    }

    /* UI Elements */
    .brand-name { font-size: 9px; font-weight: 700; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; }
    .price-int { font-family: 'Cormorant Garamond', serif; font-size: 72px; font-weight: 600; line-height: 1; color: #fff; }
    .price-dec { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--muted); }
    .m-label { font-size: 8px; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .m-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; }

    .loading-state { padding: 60px; text-align: center; }
    .spinner { 
      width: 24px; height: 24px; border: 2px solid var(--gold-line); 
      border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="money-sky"></div>

<div id="app">
  <div class="widget">
    <div class="card loading-state">
      <div class="spinner"></div>
      <div style="font-size:9px; letter-spacing:3px; color:var(--muted)">CONNECTING TO TERMINAL...</div>
    </div>
  </div>
</div>

<script>
  // ── Helpers ─────────────────────────────────────────
  const WMO = {
    0: { label: 'BULL MARKET', cls: 'up', col: '#4caf7a', desc: 'Clear skies · Strong returns' },
    3: { label: 'SIDEWAYS', cls: 'flat', col: '#c9a84c', desc: 'Overcast · Stable trend' },
    61: { label: 'BEAR MARKET', cls: 'down', col: '#c95252', desc: 'Rain · Selling pressure' }
  };

  function getWmo(code) { return WMO[code] || WMO; }

  // ── Background Effects ──────────────────────────────
  function updateSky(code) {
    const sky = document.getElementById('money-sky');
    sky.innerHTML = '';
    const hour = new Date().getHours();
    const xPos = ((hour - 6) / 12) * 80 + 10;
    
    const coin = document.createElement('div');
    coin.className = 'celestial-coin';
    coin.style.left = `${xPos}%`;
    coin.style.top = '15%';
    coin.textContent = (hour > 6 && hour < 18) ? '🟡' : '🔘';
    sky.appendChild(coin);
  }

  // ── Search & API Logic ──────────────────────────────
  async function searchTerminal(e) {
    if (e.key === 'Enter') {
      const city = e.target.value.trim();
      if (!city) return;
      try {
        const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
        const geoData = await geo.json();
        if (geoData.results) {
          const { latitude, longitude, name } = geoData.results;
          const weather = await fetchWeather(latitude, longitude);
          renderTerminal(weather, name.toUpperCase());
        }
      } catch (err) { console.error("Search failed", err); }
    }
  }

  async function fetchWeather(lat, lng) {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&timezone=auto`);
    return r.json();
  }

  // ── Render Dashboard ────────────────────────────────
  function renderTerminal(data, cityName) {
    const cur = data.current;
    const info = getWmo(cur.weather_code);
    const temp = Math.abs(cur.temperature_2m);
    const tInt = Math.floor(temp);
    const tDec = (temp % 1).toFixed(2).slice(1);

    updateSky(cur.weather_code);

    const html = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div class="brand-name">◈ &nbsp;Weather Market</div>
            <div style="font-size:12px; color:var(--muted); font-weight:600;">${cityName}</div>
          </div>
          <div style="font-family:'Courier Prime'; font-size:11px; color:var(--muted)" id="clk">--:--:--</div>
        </div>
        <input type="text" class="terminal-input" placeholder="Enter City Symbol..." onkeypress="searchTerminal(event)">
      </div>

      <div class="card" style="text-align:center;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
          <span style="font-family:'Courier Prime'; font-size:10px; color:var(--muted);">WTH / INDEX</span>
          <span style="color:${info.col}; font-family:'Courier Prime'; font-size:10px;">${info.label}</span>
        </div>
        <div>
          <span style="font-family:'Cormorant Garamond'; font-size:24px; color:var(--gold); vertical-align:top;">₹</span>
          <span class="price-int">${tInt}</span><span class="price-dec">${tDec}</span>
        </div>
        <div style="font-size:8px; letter-spacing:2px; color:var(--muted); margin-top:15px;">${info.desc}</div>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="card">
          <div class="m-label">Liquidity</div>
          <div class="m-value" style="color:#5eb3ff">${cur.relative_humidity_2m}%</div>
        </div>
        <div class="card">
          <div class="m-label">Volatility</div>
          <div class="m-value" style="color:var(--gold)">${cur.wind_speed_10m} <small style="font-size:10px">km/h</small></div>
        </div>
      </div>
    `;

    document.getElementById('app').innerHTML = `<div class="widget">${html}</div>`;
    
    // Start Clock
    setInterval(() => {
      const c = document.getElementById('clk');
      if (c) c.textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
    }, 1000);
  }

  // ── Initialization ──────────────────────────────────
  async function init() {
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude } = pos.coords;
        const weather = await fetchWeather(latitude, longitude);
        renderTerminal(weather, "LOCAL TERMINAL");
      },
      () => {
        // Fallback to default if location is denied
        searchTerminal({ key: 'Enter', target: { value: 'Mumbai' } });
      }
    );
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            transition: background 1s ease; /* Smooth color transition */
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dynamic Weather Backgrounds */
        body.sunny { background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%); }
        body.rainy { background: linear-gradient(135deg, #616161 0%, #9bc5c3 100%); }
        body.cloudy { background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%); }
        body.clear { background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); }
        body.snow { background: linear-gradient(135deg, #EAEAEA 0%, #DBDBDB 100%); }

        .weather-card {
            background: rgba(255, 255, 255, 0.7); /* Semi-transparent */
            backdrop-filter: blur(15px); /* Premium Glass effect */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            padding: 3.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .temp-display {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin: 1rem 0;
            color: #222;
        }

        .condition-text {
            font-size: 1.25rem;
            color: #555;
            text-transform: capitalize;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .form-control {
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 0.75rem 1.25rem;
        }

        .form-control:focus {
            box-shadow: none;
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0,0,0,0.1);
        }

        .btn-dark {
            border-radius: 15px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-dark:active {
            transform: scale(0.95);
        }

        .stats-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h4 class="fw-light mb-4" style="letter-spacing: 2px;">FORECAST</h4>
        
        <div class="input-group mb-2">
            <input type="text" id="city-input" class="form-control" placeholder="Search City..." autocomplete="off">
            <button class="btn btn-dark" type="button" id="search-btn">Check</button>
        </div>
        <small id="error-msg" class="text-danger d-none">Alphabets only, please.</small>

        <div id="weather-content" class="d-none">
            <div class="temp-display" id="temp">--°C</div>
            <div class="condition-text" id="condition">--</div>
            
            <div class="row mt-4 pt-4 border-top border-white border-opacity-50">
                <div class="col-6">
                    <div class="stats-label">Humidity</div>
                    <div class="fw-bold fs-5" id="humidity">--%</div>
                </div>
                <div class="col-6 border-start border-white border-opacity-50">
                    <div class="stats-label">Wind Speed</div>
                    <div class="fw-bold fs-5" id="wind">-- km/h</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Replace with your actual key from WeatherAPI.com
        const apiKey = '33fa0ac145624d7ea6c40048260304'; 
        
        const searchBtn = document.getElementById('search-btn');
        const cityInput = document.getElementById('city-input');
        const errorMsg = document.getElementById('error-msg');
        const weatherContent = document.getElementById('weather-content');

        async function fetchWeather(city) {
            try {
                const response = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}`);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                
                // Update text values
                document.getElementById('temp').innerText = `${Math.round(data.current.temp_c)}°C`;
                document.getElementById('condition').innerText = data.current.condition.text;
                document.getElementById('humidity').innerText = `${data.current.humidity}%`;
                document.getElementById('wind').innerText = `${data.current.wind_kph} km/h`;
                
                // Update Background and Show Content
                updateBackground(data.current.condition.text.toLowerCase());
                weatherContent.classList.remove('d-none');
                
            } catch (err) {
                alert("City not found. Please check the spelling.");
            }
        }

        function updateBackground(condition) {
            const body = document.body;
            body.className = ''; // Reset all classes
            
            if (condition.includes('sun')) body.classList.add('sunny');
            else if (condition.includes('rain') || condition.includes('drizzle')) body.classList.add('rainy');
            else if (condition.includes('cloud') || condition.includes('overcast')) body.classList.add('cloudy');
            else if (condition.includes('clear')) body.classList.add('clear');
            else if (condition.includes('snow')) body.classList.add('snow');
        }

        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (/^[A-Za-z\s]+$/.test(city)) {
                errorMsg.classList.add('d-none');
                fetchWeather(city);
            } else {
                errorMsg.classList.remove('d-none');
            }
        });

        // Allow 'Enter' key to trigger search
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Weather Market Terminal</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0a08" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Courier+Prime&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet" />

  <style>
    /* ── Theme Architecture ── */
    :root {
      --bg: #f5f2ed;
      --card: rgba(255, 255, 255, 0.85);
      --text: #1a1a1a;
      --gold: #b08d3e;
      --green: #2d8659;
      --red: #c24141;
      --border: rgba(176, 141, 62, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a08;
        --card: rgba(18, 16, 14, 0.9);
        --text: #e8dfc8;
        --border: rgba(201, 168, 76, 0.15);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Barlow Condensed', sans-serif; 
      min-height: 100vh; overflow-x: hidden;
      transition: background 0.5s ease;
    }

    /* ── Money Sky Background ── */
    #money-sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15; }
    .coin { position: absolute; font-size: 40px; animation: spin 8s linear infinite; }
    @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    #app { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; backdrop-filter: blur(12px);
    }

    .ticker-id { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    
    .search-box {
      width: 100%; background: rgba(0,0,0,0.05); border: 1px solid var(--border);
      padding: 12px; border-radius: 8px; color: var(--text);
      font-family: 'Courier Prime', monospace; font-size: 14px; outline: none; margin-top: 10px;
    }

    .price-main { font-family: 'Cormorant Garamond', serif; font-size: 64px; line-height: 1; margin: 10px 0; }
    .spread-chip { display: inline-block; padding: 4px 12px; border-radius: 4px; font-family: 'Courier Prime', monospace; font-size: 11px; font-weight: bold; }
    .up { background: rgba(45, 134, 89, 0.1); color: var(--green); }
    .down { background: rgba(194, 65, 65, 0.1); color: var(--red); }

    .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; text-align: center; margin-top: 10px; }
    .vs-val { font-family: 'Cormorant Garamond', serif; font-size: 24px; }

    .hidden { display: none; }
  </style>
</head>
<body>

<div id="money-sky"></div>

<div id="app">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span class="ticker-id">Terminal / Search</span>
      <span id="clk" class="ticker-id">00:00:00</span>
    </div>
    <input type="text" id="cityInput" class="search-box" placeholder="TYPE CITY & HIT ENTER...">
  </div>

  <div id="main-content">
    </div>
</div>

<script>
  let baseTemp = null;
  let baseCity = "";

  // ── Core Engine ──
  async function getWeather(lat, lon) {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`);
    return r.json();
  }

  function updateBackground(code) {
    const sky = document.getElementById('money-sky');
    sky.innerHTML = '';
    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.style.left = '70%'; coin.style.top = '15%';
    coin.textContent = (code <= 3) ? '🟡' : '🔘'; 
    sky.appendChild(coin);
    
    // Sentiment Colors
    if (code <= 3) document.body.style.backgroundColor = "rgba(45, 134, 89, 0.05)";
    else if (code >= 51) document.body.style.backgroundColor = "rgba(194, 65, 65, 0.05)";
  }

  function render(data, cityName, isComparison = false) {
    const cur = data.current;
    const temp = cur.temperature_2m;
    const tInt = Math.floor(Math.abs(temp));
    const tDec = (Math.abs(temp) % 1).toFixed(2).split('.');
    const sentiment = cur.weather_code <= 3 ? 'BULLISH' : 'BEARISH';
    const sentClass = cur.weather_code <= 3 ? 'up' : 'down';

    updateBackground(cur.weather_code);

    let comparisonHtml = "";
    if (isComparison && baseTemp !== null) {
      const spread = (temp - baseTemp).toFixed(2);
      comparisonHtml = `
        <div class="card" style="margin-top:12px">
          <p class="ticker-id">Market Spread / ${baseCity} vs ${cityName}</p>
          <div class="vs-grid">
            <div><p style="font-size:10px">${baseCity}</p><p class="vs-val">${baseTemp.toFixed(1)}°</p></div>
            <div style="font-family:'Courier Prime'; color:var(--gold)">VS</div>
            <div><p style="font-size:10px">${cityName}</p><p class="vs-val">${temp.toFixed(1)}°</p></div>
          </div>
          <p style="text-align:center; font-family:'Courier Prime'; font-size:11px; margin-top:10px;">
            DIFF: <span class="${spread >= 0 ? 'up' : 'down'}">${spread > 0 ? '+' : ''}${spread}°</span>
          </p>
        </div>
      `;
    } else {
      baseTemp = temp;
      baseCity = cityName;
    }

    const html = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <p class="ticker-id">Market: ${cityName}</p>
            <h1 class="price-main">₹${tInt}<span style="font-size:24px; opacity:0.5">.${tDec}</span></h1>
          </div>
          <div class="spread-chip ${sentClass}">${sentiment}</div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px; border-top:1px solid var(--border); padding-top:15px;">
          <div><p class="ticker-id" style="font-size:9px">Liquidity</p><p class="vs-val">${cur.relative_humidity_2m}%</p></div>
          <div><p class="ticker-id" style="font-size:9px">Volatility</p><p class="vs-val">${cur.wind_speed_10m} <span style="font-size:10px">km/h</span></p></div>
        </div>
      </div>
      ${comparisonHtml}
    `;
    document.getElementById('main-content').innerHTML = html;
  }

  // ── Search Handler ──
  document.getElementById('cityInput').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const city = e.target.value.trim();
      if (!city) return;
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
        const geo = await res.json();
        if (geo.results) {
          const target = geo.results;
          const weather = await getWeather(target.latitude, target.longitude);
          render(weather, target.name.toUpperCase(), true);
        }
      } catch (err) { console.error("Search failed", err); }
    }
  });

  // ── Initialization ──
  function init() {
    setInterval(() => {
      document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
    }, 1000);

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude: lat, longitude: lon } = pos.coords;
      const weather = await getWeather(lat, lon);
      const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
      const geoD = await geo.json();
      render(weather, geoD.city.toUpperCase() || "LOCAL");
    }, () => {
      // Fallback
      document.getElementById('cityInput').value = "Mumbai";
      document.getElementById('cityInput').dispatchEvent(new KeyboardEvent('keypress', {key: 'Enter'}));
    });
  }

  init();
</script>
</body>
</html>

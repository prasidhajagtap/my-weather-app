<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Weather Market</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0a08" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0c0a08; --bg2: #131109; --gold: #c9a84c; --gold-glow: rgba(201,168,76,0.15);
      --gold-line: rgba(201,168,76,0.1); --cream: #e8dfc8; --muted: #5c5040;
      --green: #4caf7a; --red: #c95252; --blue: #5a92c9; --glass: rgba(255,255,255,0.022);
      --gb: rgba(201,168,76,0.09);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f2ed; --bg2: #ece9e0; --gold: #a68a3d; --cream: #1a1a1a;
        --muted: #7d705d; --glass: rgba(0,0,0,0.03); --gold-line: rgba(166,138,61,0.15);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg); color: var(--cream); font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--gold-line) 1px, transparent 1px), linear-gradient(90deg, var(--gold-line) 1px, transparent 1px); background-size: 44px 44px; z-index: 0; pointer-events: none; }
    
    #app { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .widget { width: 100%; max-width: 390px; display: flex; flex-direction: column; gap: 10px; }

    .search-container { position: relative; width: 100%; }
    .search-input {
      width: 100%; background: var(--glass); border: 1px solid var(--gb); border-radius: 12px;
      padding: 12px 15px; color: var(--cream); font-family: 'Courier Prime', monospace;
      font-size: 11px; letter-spacing: 1px; outline: none; text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    .card { background: var(--glass); border: 1px solid var(--gb); border-radius: 18px; backdrop-filter: blur(28px); padding: 17px 20px; position: relative; overflow: hidden; }
    .brand-name { font-size: 9px; font-weight: 700; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
    .price-int { font-family: 'Cormorant Garamond', serif; font-size: clamp(54px, 17vw, 78px); font-weight: 600; letter-spacing: -3px; color: var(--cream); }
    .price-dec { font-family: 'Cormorant Garamond', serif; font-size: clamp(30px, 10vw, 44px); font-weight: 300; color: var(--muted); }
    .badge { font-family: 'Courier Prime', monospace; font-size: 10px; padding: 2px 9px; border-radius: 5px; }
    .badge.up { background: rgba(76,175,122,.1); color: var(--green); }
    .badge.down { background: rgba(201,82,82,.1); color: var(--red); }
    
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: var(--glass); border: 1px solid var(--gb); border-radius: 14px; padding: 15px; }
    .m-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; }
    
    .spinner { width: 24px; height: 24px; border: 2px solid var(--gb); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="app">
  <div class="widget">
    <div class="card" style="text-align:center; padding: 50px 20px;">
      <div class="spinner"></div>
      <div style="font-size: 8px; letter-spacing: 3px; color: var(--gold);">ESTABLISHING CONNECTION...</div>
    </div>
  </div>
</div>

<script>
  let localData = null;

  const WMO = {
    0: { label: 'BULL MARKET', desc: 'Clear skies · Strong outlook', cls: 'up' },
    1: { label: 'STEADY MARKET', desc: 'Mainly clear', cls: 'up' },
    3: { label: 'SIDEWAYS', desc: 'Overcast · Neutral trend', cls: 'flat' },
    61: { label: 'BEAR MARKET', desc: 'Rain · Selling pressure', cls: 'down' }
  };

  function getWmo(code) { return WMO[code] || { label: 'MARKET OPEN', desc: 'Trading active', cls: 'flat' }; }

  async function fetchWeather(lat, lng) {
    if (!lat || !lng) return null;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`;
    const r = await fetch(url);
    return r.json();
  }

  function render(data, city, isComparison = false) {
    if (!data) return;
    const cur = data.current;
    const info = getWmo(cur.weather_code);
    const temp = cur.temperature_2m;
    const tInt = Math.floor(Math.abs(temp));
    const tDec = (Math.abs(temp) % 1).toFixed(2).slice(1);

    let spreadHtml = "";
    if (isComparison && localData) {
      const diff = (temp - localData.temp).toFixed(1);
      spreadHtml = `
        <div class="card" style="border: 1px dashed var(--gold); background: rgba(201,168,76,0.02);">
          <div class="brand-name">SPREAD // ${localData.city} vs ${city}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
             <span style="font-size:20px; font-family:'Cormorant Garamond';">${localData.temp.toFixed(1)}°</span>
             <span style="font-family:'Courier Prime'; color:var(--gold); font-size:10px;">VS</span>
             <span style="font-size:20px; font-family:'Cormorant Garamond';">${temp.toFixed(1)}°</span>
          </div>
          <div style="text-align:center; font-family:'Courier Prime'; font-size:10px; margin-top:10px;">
            DIFFERENTIAL: <span class="${diff >= 0 ? 'up' : 'down'}">${diff > 0 ? '+' : ''}${diff}°</span>
          </div>
        </div>`;
    }

    const html = `
      <div class="search-container">
        <input type="text" id="citySearch" class="search-input" placeholder="SEARCH CITY TERMINAL..." autocomplete="off">
      </div>
      
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div class="brand-name">◈ Weather Market</div>
            <div style="font-size:11px; color:var(--muted); letter-spacing:1px;">${city}</div>
          </div>
          <div id="liveClock" style="font-family:'Courier Prime'; font-size:12px; color:var(--muted);">00:00:00</div>
        </div>
        <div style="text-align:center; padding:15px 0;">
          <span style="font-family:'Cormorant Garamond'; color:var(--gold); font-size:28px; vertical-align:top;">₹</span>
          <span class="price-int">${tInt}</span><span class="price-dec">${tDec}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="badge ${info.cls}">${info.label}</span>
          <span style="font-size:10px; color:var(--muted);">${info.desc}</span>
        </div>
      </div>

      ${spreadHtml}

      <div class="metrics-grid">
        <div class="metric">
          <div class="brand-name" style="font-size:7px;">LIQUIDITY</div>
          <div class="m-value" style="color:var(--blue)">${cur.relative_humidity_2m}%</div>
        </div>
        <div class="metric">
          <div class="brand-name" style="font-size:7px;">VOLATILITY</div>
          <div class="m-value" style="color:var(--gold)">${cur.wind_speed_10m}<small style="font-size:12px">km/h</small></div>
        </div>
      </div>
    `;

    document.getElementById('app').innerHTML = `<div class="widget">${html}</div>`;
    
    document.getElementById('citySearch').addEventListener('keypress', e => {
      if (e.key === 'Enter') handleSearch(e.target.value);
    });

    setInterval(() => {
      const el = document.getElementById('liveClock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-IN', { hour12: false });
    }, 1000);
  }

  async function handleSearch(query) {
    if (!query) return;
    try {
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`);
      const geo = await res.json();
      if (geo.results && geo.results) {
        const target = geo.results;
        const weather = await fetchWeather(target.latitude, target.longitude);
        render(weather, target.name.toUpperCase(), true);
      }
    } catch (err) { console.error("Search failed", err); }
  }

  async function init() {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude: lat, longitude: lon } = pos.coords;
      const [weather, geo] = await Promise.all([
        fetchWeather(lat, lon),
        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`).then(r => r.json())
      ]);
      const cityName = (geo.city || geo.locality || "LOCAL").toUpperCase();
      localData = { temp: weather.current.temperature_2m, city: cityName };
      render(weather, cityName);
    }, () => {
      handleSearch("Navi Mumbai");
    });
  }

  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Weather</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
<div class="weather-card text-center">
    <div class="container text-center shadow-sm p-5 bg-white rounded-4" style="max-width: 500px;">
        <h2 class="fw-light mb-4">Weather</h2>
        
        <div class="input-group mb-3">
            <input type="text" id="city-input" class="form-control border-0 bg-light py-2" placeholder="Enter city name..." aria-label="City name">
            <button class="btn btn-dark px-4" type="button" id="search-btn">Search</button>
        </div>

        <div id="weather-display" class="mt-4 d-none">
            <h1 id="temp" class="display-1 fw-bold">--°C</h1>
            <p id="condition" class="text-muted fs-4 text-capitalize">--</p>
            <div class="d-flex justify-content-around mt-4">
                <div>
                    <small class="text-uppercase text-secondary">Humidity</small>
                    <p id="humidity" class="fw-bold">--%</p>
                </div>
                <div>
                    <small class="text-uppercase text-secondary">Wind</small>
                    <p id="wind" class="fw-bold">-- km/h</p>
                </div>
            </div>
        </div>
        
        <div id="error-msg" class="text-danger mt-2 d-none small">
            Please use alphabets only for the city name.
        </div>
    </div>
</div> 

    <script src="script.js"></script>
</body>
</html>
